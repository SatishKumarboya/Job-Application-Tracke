<!-- 
Build a modern, clean, and responsive UI for a Job Application Tracker using Bootstrap 5.

Requirements:
- Use a professional dashboard layout
- Add a navbar with title "Job Tracker"
- Add a button "Add Job" styled with Bootstrap primary button
- Display jobs in a responsive table with columns:
  Company | Role | Status | Actions

- Style status using colored badges:
  Applied -> blue badge
  Interview -> yellow badge
  Rejected -> red badge

- Add hover effects on table rows
- Add icons for Edit and Delete buttons (use Bootstrap icons)

- Use cards or containers to center content nicely
- Add proper spacing, padding, and alignment

- Include a search bar at the top to filter jobs by company name
- Include a dropdown filter for job status

- Make the UI look clean, modern, and recruiter-impressive
- Keep it simple, not over-designed
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Job Tracker</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Job Applications</h2>
                    <a href="{{ url_for('add') }}" class="btn btn-primary">Add Job</a>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <input type="text" id="searchInput" class="form-control" placeholder="Search by company...">
                            </div>
                            <div class="col-md-6">
                                <select id="statusFilter" class="form-select">
                                    <option value="">All Statuses</option>
                                    <option value="Applied">Applied</option>
                                    <option value="Interview">Interview</option>
                                    <option value="Rejected">Rejected</option>
                                </select>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Company</th>
                                        <th>Role</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="jobsTable">
                                    {% for job in jobs %}
                                    <tr data-company="{{ job.company }}" data-status="{{ job.status }}">
                                        <td>{{ job.company }}</td>
                                        <td>{{ job.role }}</td>
                                        <td>
                                            {% if job.status == 'Applied' %}
                                                <span class="badge bg-primary">Applied</span>
                                            {% elif job.status == 'Interview' %}
                                                <span class="badge bg-warning text-dark">Interview</span>
                                            {% elif job.status == 'Rejected' %}
                                                <span class="badge bg-danger">Rejected</span>
                                            {% endif %}
                                        </td>
                                        <td>
                                            <a href="{{ url_for('edit', id=job.id) }}" class="btn btn-sm btn-outline-primary me-2">
                                                <i class="bi bi-pencil"></i> Edit
                                            </a>
                                            <form action="{{ url_for('delete', id=job.id) }}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                                    <i class="bi bi-trash"></i> Delete
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
