<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Job Application Tracker</h2>
            <a href="{{ url_for('add') }}" class="btn btn-primary">+ Add Job</a>
        </div>

        <!-- Search + Filter -->
        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by company...">
            </div>
            <div class="col-md-6">
                <select id="statusFilter" class="form-select">
                    <option value="">All Status</option>
                    <option value="Applied">Applied</option>
                    <option value="Interview">Interview</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>

        <!-- Table -->
        <table class="table table-hover table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="jobTable">
                {% for job in jobs %}
                <tr>
                    <td class="company">{{ job.company }}</td>
                    <td>{{ job.role }}</td>
                    <td>
                        {% if job.status == "Applied" %}
                            <span class="badge bg-primary">Applied</span>
                        {% elif job.status == "Interview" %}
                            <span class="badge bg-warning text-dark">Interview</span>
                        {% else %}
                            <span class="badge bg-danger">Rejected</span>
                        {% endif %}
                    </td>
                    <td>
                        <a href="{{ url_for('edit', id=job.id) }}" class="btn btn-outline-primary btn-sm me-1">Edit</a>
                        <form action="{{ url_for('delete', id=job.id) }}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

<script>
    // SEARCH FUNCTION
    document.getElementById("searchInput").addEventListener("keyup", function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#jobTable tr");

        rows.forEach(row => {
            let company = row.querySelector(".company").innerText.toLowerCase();
            row.style.display = company.includes(filter) ? "" : "none";
        });
    });

    // FILTER FUNCTION
    document.getElementById("statusFilter").addEventListener("change", function() {
        let filter = this.value;
        let rows = document.querySelectorAll("#jobTable tr");

        rows.forEach(row => {
            let status = row.innerText;
            row.style.display = (filter === "" || status.includes(filter)) ? "" : "none";
        });
    });
</script>

</body>
</html>
